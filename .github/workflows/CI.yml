name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Plumber, InvokeBuild, PSScriptAnalyzer, Pester -Scope CurrentUser -Force

      - name: Invoke-Plumber
        shell: pwsh
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Validate
