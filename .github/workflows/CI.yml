name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Plumber -RequiredVersion 0.0.27 -Scope CurrentUser -Force
          Install-Module InvokeBuild -RequiredVersion 5.14.23 -Scope CurrentUser -Force
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
          Install-Module powershell-yaml -RequiredVersion 0.4.12 -Scope CurrentUser -Force

      - name: Run Validate
        shell: pwsh
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Validate

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Plumber -RequiredVersion 0.0.27 -Scope CurrentUser -Force
          Install-Module InvokeBuild -RequiredVersion 5.14.23 -Scope CurrentUser -Force
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
          Install-Module powershell-yaml -RequiredVersion 0.4.12 -Scope CurrentUser -Force
          Install-Module Microsoft.PowerShell.PSResourceGet -RequiredVersion 1.2.0 -Scope CurrentUser -Force

      - name: Run Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_CONFIRM: true
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
          PSGALLERY_PUBLISH_CONFIRM: true
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Release
