name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          (Import-PowerShellDataFile ./Plumber.Release.psd1).ModuleList |
              ForEach-Object {
                Install-Module `
                  -Name $_.ModuleName `
                  -RequiredVersion $_.ModuleVersion `
                  -Scope CurrentUser `
                  -Force
              }

      - name: Run Validate
        shell: pwsh
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Validate

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          (Import-PowerShellDataFile ./Plumber.Release.psd1).ModuleList |
              ForEach-Object {
                Install-Module `
                  -Name $_.ModuleName `
                  -RequiredVersion $_.ModuleVersion `
                  -Scope CurrentUser `
                  -Force
              }

      - name: Run Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
          GITHUB_RELEASE_CONFIRM: true
          PSGALLERY_PUBLISH_CONFIRM: true
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Release
