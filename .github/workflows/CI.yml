name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Plumber -Scope CurrentUser -Force
          Install-Module InvokeBuild -MinimumVersion 5.14.23 -Scope CurrentUser -Force
          Install-Module Pester -MinimumVersion 5.7.0 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -MinimumVersion 1.24.0 -Scope CurrentUser -Force
          Install-Module powershell-yaml -MinimumVersion 0.4.12 -Scope CurrentUser -Force

      - name: Invoke-Plumber
        shell: pwsh
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Validate
