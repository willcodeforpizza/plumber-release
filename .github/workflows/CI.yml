name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Plumber -Scope CurrentUser -Force
          Install-Module InvokeBuild -MinimumVersion 5.14.23 -Scope CurrentUser -Force
          Install-Module Pester -MinimumVersion 5.7.0 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -MinimumVersion 1.24.0 -Scope CurrentUser -Force
          Install-Module powershell-yaml -MinimumVersion 0.4.12 -Scope CurrentUser -Force

      - name: Run Validate
        shell: pwsh
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Validate

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Plumber -Scope CurrentUser -Force
          Install-Module InvokeBuild -MinimumVersion 5.14.23 -Scope CurrentUser -Force
          Install-Module Pester -MinimumVersion 5.7.0 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -MinimumVersion 1.24.0 -Scope CurrentUser -Force
          Install-Module powershell-yaml -MinimumVersion 0.4.12 -Scope CurrentUser -Force
          Install-Module Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force

      - name: Run Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_CONFIRM: true
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
          PSGALLERY_PUBLISH_CONFIRM: true
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Build -File ./Plumber.Release.build.ps1 Release
