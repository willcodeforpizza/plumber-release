name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    if: github.ref_type != 'tag'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          $dependencies = (Import-PowerShellDataFile ./Plumber.dependencies.psd1).Modules
          $plumber = $dependencies | Where-Object ModuleName -eq Plumber
          $installSplat = @{
            Name            = $plumber.ModuleName
            RequiredVersion = $plumber.ModuleVersion
            Scope           = 'CurrentUser'
          }
          Install-Module @installSplat
          $importSplat = @{
            Name            = 'Plumber'
            RequiredVersion = $plumber.ModuleVersion
          }
          Import-Module @importSplat
          Install-PlumberDependency

      - name: Run Validate
        shell: pwsh
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Plumber -Task Validate -OutputMode CI

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: bash
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          $dependencies = (Import-PowerShellDataFile ./Plumber.dependencies.psd1).Modules
          $plumber = $dependencies | Where-Object ModuleName -eq Plumber
          $installSplat = @{
            Name            = $plumber.ModuleName
            RequiredVersion = $plumber.ModuleVersion
            Scope           = 'CurrentUser'
          }
          Install-Module @installSplat
          $importSplat = @{
            Name            = 'Plumber'
            RequiredVersion = $plumber.ModuleVersion
          }
          Import-Module @importSplat
          Install-PlumberDependency

      - name: Run Validate
        shell: pwsh
        env:
          PLUMBER_RELEASE_INTENT: true
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Plumber -Task Validate -OutputMode CI

      - name: Publish tagged release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Import-Module ./Plumber.Release.psd1 -Force
          Invoke-Plumber -Task PublishTaggedRelease -OutputMode CI
